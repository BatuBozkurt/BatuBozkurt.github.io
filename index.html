<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Batu Bozkurt — Joy Grid</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; min-height: 100vh;
    display: grid; place-items: center;
    background: linear-gradient(135deg, #1E293B, #0F172A);
    color: #F1F5F9;
    padding: 24px;
  }
  main { max-width: 560px; text-align: center; }
  h1 { font-size: 2.2rem; margin: 0 0 8px; letter-spacing: -0.5px; }
  p  { color: #94A3B8; line-height: 1.55; }
  a  { color: #60A5FA; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .cta {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 20px; padding: 12px 22px;
    border-radius: 999px;
    background: #339AF0; color: #fff;
    font-weight: 700; font-size: 14px;
    text-decoration: none; letter-spacing: 0.2px;
    box-shadow: 0 8px 24px rgba(51,154,240,0.35);
    transition: transform 0.15s ease;
  }
  .cta:hover { transform: translateY(-1px); text-decoration: none; }
  .cta svg { width: 16px; height: 16px; }
</style>
</head>
<body>
<main>
  <h1>Joy Grid</h1>
  <p>Bir mini-oyun koleksiyonu — Snake, Tetris, 2048, Sudoku, Solitaire ve dahası.</p>
  <p>Geliştirici: Batu Bozkurt</p>
  <a class="cta" href="https://play.google.com/store/apps/details?id=com.batuhanbozkurt.nexushub" target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 3.5v17l9.5-8.5L3 3.5zm10.7 7.6L5.5 3.7l11.6 6.6-3.4.8zm0 1.8l3.4.8-11.6 6.6 8.2-7.4zm5.3 0c.8-.4 1.3-1 1.3-1.7s-.5-1.3-1.3-1.7l-2.4-1.3-3 2.7v.6l3 2.7 2.4-1.3z"/></svg>
    Google Play'de İndir
  </a>
</main>
</body>
</html>
