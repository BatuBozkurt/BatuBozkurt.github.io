<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Batu Bozkurt — Joy Grid</title>
<style>
  :root { color-scheme: light dark; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0; min-height: 100vh;
    display: grid; place-items: center;
    background: linear-gradient(135deg, #1E293B, #0F172A);
    color: #F1F5F9;
    padding: 24px;
  }
  main { max-width: 560px; text-align: center; }
  h1 { font-size: 2.2rem; margin: 0 0 8px; letter-spacing: -0.5px; }
  p  { color: #94A3B8; line-height: 1.55; }
  a  { color: #60A5FA; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .badge {
    display: inline-block; margin-top: 16px;
    padding: 6px 12px; border-radius: 999px;
    background: rgba(96,165,250,0.12);
    border: 1px solid rgba(96,165,250,0.30);
    font-size: 13px; color: #93C5FD;
  }
</style>
</head>
<body>
<main>
  <h1>Joy Grid</h1>
  <p>Bir mini-oyun koleksiyonu — Snake, Tetris, 2048, Sudoku, Solitaire ve dahası.</p>
  <p>Geliştirici: Batu Bozkurt</p>
  <span class="badge">Yakında Google Play'de</span>
</main>
</body>
</html>
